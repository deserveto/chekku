name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck, lint, and test
        run: npm run check
        env:
          NODE_OPTIONS: --max-old-space-size=8192
          MASTRA_TELEMETRY_DISABLED: true
          NEXT_TELEMETRY_DISABLED: 1

      - name: Build
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=8192
          MASTRA_TELEMETRY_DISABLED: true
          NEXT_TELEMETRY_DISABLED: 1
