use_default_settings: true
general:
  instance_name: Chekku Search
  debug: false
  enable_metrics: false
search:
  safe_search: 1
  autocomplete: ""
  max_page: 5
  formats:
    - html
    - json
server:
  limiter: false
  public_instance: false
  image_proxy: false
  method: POST
outgoing:
  request_timeout: 5.0
  max_request_timeout: 10.0
